name: Build and Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Define environment variables for the job to keep things DRY
    env:
      ECR_REPOSITORY: trailmind-api
      EB_APPLICATION_NAME: trailmind-app
      EB_ENVIRONMENT_NAME: Trailmind-app-env

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Use the Git Commit Hash as the unique tag
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Save variables for the next step
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Generate Final Dockerrun.aws.json
        env:
          ECR_REGISTRY: ${{ steps.build-image.outputs.registry }}
          IMAGE_TAG: ${{ steps.build-image.outputs.tag }}
        # We replace the placeholders in the template with actual build values
        run: |
          envsubst < deploy/Dockerrun.aws.json.template > Dockerrun.aws.json

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy
        with:
          application_name: ${{ env.EB_APPLICATION_NAME }}
          environment_name: ${{ env.EB_ENVIRONMENT_NAME }}
          version_label: "deploy-${{ github.sha }}"
          region: ${{ secrets.AWS_REGION }}
          deployment_package: 'Dockerrun.aws.json'
